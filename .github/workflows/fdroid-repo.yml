name: Build and Publish

on:
  push:
    branches: [ "main" ]
  schedule:
    - cron: "0 14 * * *"
  workflow_dispatch:

concurrency:
  group: ${{github.repository}}-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write      # to deploy to Pages
      id-token: write   # to verify the deployment originates from an appropriate source
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
#      - uses: actions/cache@v3
#        with:
#          path: fdroid/repo
#          key: ${{ hashFiles('**/download-apks.sh') }}
      - name: Download apks
        run: |
          mkdir -p ./dist
          touch ./dist/apks.txt
          ./download-apks.sh
      - run: docker-compose run fdroid update --create-metadata
      - run: |
          docker-compose run fdroid deploy -v
      - name: Setup Pages Static Files
        run: |
          # Redirect
          sudo cp ./static/redirect.html ./dist/fdroid/index.html
          # Indexes
          sudo apt-get --quiet update &> /dev/null
          sudo apt-get --quiet install -y ansilove curl &> /dev/null
          sudo bash -c "ls dist/fdroid/repo/*.apk | tr '\n' '\0' | xargs -0 -n 1 basename > ./dist/fdroid/index.txt"
          sudo ansilove -b 9 -r -o ./dist/fdroid/index.png ./dist/fdroid/index.txt
          echo "./dist/fdroid/index.txt:"
          cat ./dist/fdroid/index.txt
      - run: |
          chmod -c -R +rX "_site/" | while read line; do
            echo "::warning title=Invalid file permissions automatically fixed::$line"
          done
      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: './dist/fdroid'
          retention-days: 1
      - run: tree -a -h ./dist/fdroid
      - id: deployment
        uses: actions/deploy-pages@v4
      - uses: gautamkrishnar/keepalive-workflow@1.1.0
